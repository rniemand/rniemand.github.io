# https://www.11ty.dev/docs/deployment/#deploy-an-eleventy-project-to-github-pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:

# Cancel any in-progress run for the same branch so stale builds don't queue
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"          # caches ~/.npm keyed on package-lock.json automatically

      - name: Restore Eleventy image/fetch cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-eleventy-${{ hashFiles('content/**/*.{png,jpg,jpeg,gif,webp,svg,avif}') }}
          restore-keys: |
            ${{ runner.os }}-eleventy-

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build-ghpages

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
